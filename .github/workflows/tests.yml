name: tests

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          tools: composer:v2
          coverage: xdebug

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Node Dependencies
        run: npm ci

      - name: Build Assets
        run: npm run build

      - name: Cache Library React Dependencies
        uses: actions/cache@v4
        with:
          path: library/react/node_modules
          key: ${{ runner.os }}-library-react-${{ hashFiles('library/react/package-lock.json') }}

      - name: Cache Library Vue Dependencies
        uses: actions/cache@v4
        with:
          path: library/vue/node_modules
          key: ${{ runner.os }}-library-vue-${{ hashFiles('library/vue/package-lock.json') }}

      - name: Install Library React Dependencies
        working-directory: library/react
        run: npm ci

      - name: Install Library Vue Dependencies
        working-directory: library/vue
        run: npm ci

      - name: Build Library React App
        working-directory: library/react
        run: npm run build

      - name: Build Library Vue App
        working-directory: library/vue
        run: npm run build

      - name: Create SQLite Database
        run: touch database/database.sqlite

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Run Migrations
        run: php artisan migrate --no-interaction --force

      - name: Validate Library Sync
        run: php artisan library:sync --no-interaction

      - name: Tests
        run: ./vendor/bin/phpunit
